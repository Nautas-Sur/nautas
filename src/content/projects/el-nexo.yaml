tagline:
  es: Conectando Universos. Un espacio dedicado a la tarea del despertar y al
    reconocimiento de la naturaleza humana.
  en: Connecting Universes. A space dedicated to the task of awakening and the
    recognition of human nature.
description:
  es: >
    El Nexo conecta a personas y organizaciones dedicadas a la tarea del
    despertar. Buscamos distinguir el proceso de maduración humana de intereses
    foráneos que obstaculizan nuestro desarrollo armónico.


    Proponemos un despertar de la hipnosis mercantilista, recuperando la unión hacia un propósito conjunto sostenible y reactivando el viaje de la consciencia colectiva.


    Referimos a un Nexo como un tejido vincular profundo que reconecta lo que ha sido fragmentado en la mente y la sociedad. Integramos saberes de todos los tiempos que se actualizan a través de enseñanzas de influencia nutricia y aprendizaje continuo.
  en: >
    El Nexo connects people and organizations dedicated to the task of
    awakening. We seek to distinguish the process of human maturation from
    foreign interests that hinder our harmonious development.


    We propose an awakening from mercantilist hypnosis, recovering unity toward a sustainable common purpose and reactivating the journey of collective consciousness.


    We refer to a Nexus as a deep connective tissue that reconnects what has been fragmented in the mind and society. We integrate knowledge from all times, updated through teachings of nurturing influence and continuous learning.
