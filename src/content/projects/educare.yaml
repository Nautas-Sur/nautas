featured: false
tagline:
  es: >-
    Jornadas de capacitación e integración diseñadas para profesionales de la
    educación.
  en: Training and integration workshops designed for education professionals.
description:
  es: >
    EduCare es un programa de jornadas de capacitación e integración diseñadas
    para profesionales de la educación, basadas en programas internacionales de
    eficacia comprobada a través de años de experimentación e innovación.


    Las jornadas consisten en ciclos de 1, 2 o más días de duración, con una
    continuidad cada 2 o 3 meses, permitiendo una verdadera transformación del
    entorno educativo.


    A través de metodologías innovadoras y dinámicas participativas, EduCare
    busca impulsar la integración en las instituciones educativas.
  en: >
    EduCare is a program of training and integration workshops designed for
    education professionals, based on international programs proven effective
    through years of experimentation and innovation.


    The workshops consist of 1, 2, or more day cycles, with continuity every 2
    to 3 months, enabling a true transformation of the educational environment.


    Through innovative methodologies and participatory dynamics, EduCare seeks
    to promote integration in educational institutions.
